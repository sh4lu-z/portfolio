<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Shaluka Gimhan</title>
    <link rel="stylesheet" href="/css/style.css">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .admin-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }
        .admin-form label {
            font-weight: 600;
        }
        .admin-form input, .admin-form select, .admin-form textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
        }
        .admin-form textarea {
            min-height: 150px;
            resize: vertical;
        }
        .preview-box {
            border: 1px dashed #ccc;
            padding: 15px;
            background: #fafafa;
            border-radius: 4px;
            margin-top: 10px;
        }
        .item-list {
            list-style: none;
            padding: 0;
        }
        .item-list li {
            border-bottom: 1px solid #eee;
            padding: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .delete-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">
    <!-- Dark Mode Toggle -->
    <button id="darkModeToggle" class="dark-mode-btn" aria-label="Toggle Dark Mode">
        <i class="fas fa-moon"></i>
    </button>

    <div class="container" style="flex: 1; display: flex; flex-direction: column;">
        <header>
            <h1>Admin Dashboard</h1>
            <p>Manage your directory items (Projects, Datasets, Research, etc.)</p>
            <p><a href="/" class="back-link">&larr; Back to Home</a></p>
        </header>

        <!-- Login Section -->
        <section id="loginContent" style="display: none; max-width: 400px; margin: 40px auto; width: 100%;">
            <div class="item-card">
                <h2 style="text-align: center; margin-bottom: 20px;"><i class="fas fa-lock"></i> Secure Login</h2>
                <p style="text-align: center; font-size: 0.9rem; color: #666; margin-bottom: 20px;">Enter your secure Admin Key to continue.</p>
                <form id="loginForm" class="admin-form">
                    <label for="adminKey">Admin Key</label>
                    <input type="password" id="adminKey" placeholder="Enter secure key..." required>
                    <button type="submit" class="send-btn" style="width: 100%; margin-top: 10px;">Login</button>
                </form>
            </div>
        </section>

        <!-- Admin Content Section -->
        <div id="adminContent" style="display: none;">
            <div style="text-align: right; margin-bottom: 20px;">
                <button id="logoutBtn" class="link-btn" style="background: #ff4444; border: none; padding: 8px 15px; color: white; border-radius: 4px; cursor: pointer;"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
            <section>
                <h2>Add New Item</h2>
            <form id="addItemForm" class="admin-form">
                <label for="type">Category / Type</label>
                <select id="type" required>
                    <option value="project">Project</option>
                    <option value="dataset">Dataset</option>
                    <option value="research">Research</option>
                </select>

                <label for="title">Title</label>
                <input type="text" id="title" placeholder="e.g. Sinhala Llama 3" required>

                <label for="tags">Tags (Comma separated, Optional)</label>
                <input type="text" id="tags" placeholder="e.g. AI, NLP, Python">

                <div id="linkGroup" style="display: none; flex-direction: column; gap: 15px;">
                    <label for="link">External Link (URL)</label>
                    <input type="url" id="link" placeholder="e.g. https://kaggle.com/... or https://docs.google.com/...">
                </div>

                <div id="descGroup" style="display: flex; flex-direction: column; gap: 15px;">
                    <label id="descLabel" for="description">README.md Content (Markdown Supported)</label>
                    <textarea id="description" placeholder="Write your README style description here..." required></textarea>
                </div>
                
                <div id="previewGroup">
                    <strong>Live Preview:</strong>
                    <div id="preview" class="preview-box markdown-body"></div>
                </div>

                <button type="submit" class="send-btn">Save Item</button>
            </form>
        </section>

        <hr>

        <section>
            <h2>Manage Existing Items</h2>
            <label for="filterType">Filter by Category:</label>
            <select id="filterType" style="padding: 5px; margin-bottom: 15px;">
                <option value="project">Project</option>
                <option value="dataset">Dataset</option>
                <option value="research">Research</option>
            </select>
            
            <ul id="itemsList" class="item-list">
                <li>Loading...</li>
            </ul>
        </section>
        </div>
    </div>

    <script src="/js/darkmode.js"></script>
    <script>
        const loginContent = document.getElementById('loginContent');
        const adminContent = document.getElementById('adminContent');
        const loginForm = document.getElementById('loginForm');
        const logoutBtn = document.getElementById('logoutBtn');

        // Check Auth Status
        async function checkAuth() {
            try {
                const res = await fetch('/api/auth/check');
                const data = await res.json();
                if (data.authenticated) {
                    loginContent.style.display = 'none';
                    adminContent.style.display = 'block';
                    loadItems(filterType.value);
                } else {
                    loginContent.style.display = 'block';
                    adminContent.style.display = 'none';
                }
            } catch (error) {
                loginContent.style.display = 'block';
                adminContent.style.display = 'none';
            }
        }

        // Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const adminKey = document.getElementById('adminKey').value;
            const btn = loginForm.querySelector('button');
            btn.textContent = 'Logging in...';
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminKey })
                });
                
                if (res.ok) {
                    document.getElementById('adminKey').value = '';
                    checkAuth();
                } else {
                    alert('Invalid Admin Key');
                }
            } catch (error) {
                alert('Login error');
            } finally {
                btn.textContent = 'Login';
            }
        });

        // Logout
        logoutBtn.addEventListener('click', async () => {
            await fetch('/api/auth/logout', { method: 'POST' });
            checkAuth();
        });

        const form = document.getElementById('addItemForm');
        const typeSelect = document.getElementById('type');
        const linkGroup = document.getElementById('linkGroup');
        const linkInput = document.getElementById('link');
        const descLabel = document.getElementById('descLabel');
        const descInput = document.getElementById('description');
        const previewGroup = document.getElementById('previewGroup');
        const preview = document.getElementById('preview');
        const filterType = document.getElementById('filterType');
        const itemsList = document.getElementById('itemsList');

        // Handle category change
        typeSelect.addEventListener('change', (e) => {
            const val = e.target.value;
            if (val === 'project') {
                linkGroup.style.display = 'none';
                linkInput.removeAttribute('required');
                descLabel.textContent = 'README.md Content (Markdown Supported)';
                descInput.placeholder = 'Paste your README.md markdown content here...';
                descInput.style.minHeight = '250px';
                previewGroup.style.display = 'block';
            } else {
                linkGroup.style.display = 'flex';
                linkInput.setAttribute('required', 'required');
                descLabel.textContent = 'Short Description';
                descInput.placeholder = 'Briefly describe this item...';
                descInput.style.minHeight = '100px';
                previewGroup.style.display = 'none';
            }
        });

        // Trigger change on load
        typeSelect.dispatchEvent(new Event('change'));

        // Markdown preview
        descInput.addEventListener('input', () => {
            preview.innerHTML = marked.parse(descInput.value);
        });

        // Load items
        async function loadItems(type) {
            itemsList.innerHTML = '<li>Loading...</li>';
            try {
                const res = await fetch(`/api/items/${type}`);
                const items = await res.json();
                
                if (items.length === 0) {
                    itemsList.innerHTML = '<li>No items found in this category.</li>';
                    return;
                }

                itemsList.innerHTML = '';
                items.forEach(item => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <div>
                            <strong>${item.title}</strong>
                            <div style="font-size: 0.85rem; color: #666;">${new Date(item.createdAt).toLocaleDateString()}</div>
                        </div>
                        <button class="delete-btn" onclick="deleteItem('${item._id}')">Delete</button>
                    `;
                    itemsList.appendChild(li);
                });
            } catch (error) {
                itemsList.innerHTML = '<li>Error loading items. Check if MongoDB is connected.</li>';
            }
        }

        filterType.addEventListener('change', (e) => loadItems(e.target.value));

        // Submit form
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = form.querySelector('button');
            submitBtn.textContent = 'Saving...';
            submitBtn.disabled = true;

            const data = {
                type: document.getElementById('type').value,
                title: document.getElementById('title').value,
                link: document.getElementById('link').value,
                tags: document.getElementById('tags').value,
                description: document.getElementById('description').value
            };

            try {
                const res = await fetch('/api/items', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    alert('Item saved successfully!');
                    form.reset();
                    preview.innerHTML = '';
                    loadItems(filterType.value);
                } else {
                    const err = await res.json();
                    alert('Error: ' + err.error);
                }
            } catch (error) {
                alert('Error saving item. Check console.');
            } finally {
                submitBtn.textContent = 'Save Item';
                submitBtn.disabled = false;
            }
        });

        // Delete item
        async function deleteItem(id) {
            if (!confirm('Are you sure you want to delete this item?')) return;
            
            try {
                const res = await fetch(`/api/items/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    loadItems(filterType.value);
                } else {
                    alert('Error deleting item');
                }
            } catch (error) {
                alert('Error deleting item');
            }
        }

        // Initial load
        checkAuth();
    </script>
</body>
</html>
