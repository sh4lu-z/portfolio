<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directory - Shaluka Gimhan</title>
    <link rel="stylesheet" href="/css/style.css">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .item-card {
            border: 1px solid #eaeaea;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 25px;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .item-card h3 {
            margin-top: 0;
            margin-bottom: 10px;
        }
        .item-card .tags {
            margin-bottom: 15px;
        }
        .item-card .tag {
            display: inline-block;
            background: #f1f1f1;
            color: #555;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            margin-right: 5px;
        }
        .item-card .markdown-body {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #333;
        }
        .item-card .markdown-body pre {
            background: #f6f8fa;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .item-card .markdown-body code {
            background: #f6f8fa;
            padding: 2px 4px;
            border-radius: 3px;
            font-family: monospace;
        }
        .item-card .link-btn {
            display: inline-block;
            margin-top: 15px;
            background: #333;
            color: #fff;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        .item-card .link-btn:hover {
            background: #000;
        }
    </style>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">
    <!-- Dark Mode Toggle -->
    <button id="darkModeToggle" class="dark-mode-btn" aria-label="Toggle Dark Mode">
        <i class="fas fa-moon"></i>
    </button>

    <div class="container" style="flex: 1; display: flex; flex-direction: column;">
        <header>
            <h1 id="page-title" style="text-transform: capitalize;">Directory</h1>
            <p id="page-desc">Loading content...</p>
            <p><a href="/" class="back-link">&larr; Back to Home</a></p>
        </header>

        <section id="items-container">
            <p style="color: #777;">Loading items from database...</p>
        </section>

        <hr>

        <footer>
            <p>&copy; 2026 Shaluka Gimhan (sh4lu-z). Minimalist portfolio.</p>
        </footer>
    </div>

    <script src="/js/darkmode.js"></script>
    <script>
        const categoryDescriptions = {
            'project': 'A comprehensive list of my open-source tools, software engineering projects, and security scripts.',
            'dataset': 'Curated datasets for training and fine-tuning machine learning models, focusing on cybersecurity and NLP.',
            'research': 'Academic and independent research papers, articles, and findings in AI and InfoSec.',
            'ai-lab': 'Experimental artificial intelligence models, neural network architectures, and research implementations.',
            'roadmap': 'My personal learning paths, future project plans, and goals in the tech industry.',
            'services': 'Professional services offered including penetration testing, custom AI model development, and consulting.',
            'tools': 'A collection of utility scripts, hacking tools, and productivity software I\'ve built.',
            'hidden-1': 'Classified or work-in-progress experiments. Access restricted or invite-only.'
        };

        const categoryTitles = {
            'project': 'Projects',
            'dataset': 'Datasets',
            'research': 'Research',
            'ai-lab': 'AI Lab',
            'roadmap': 'Roadmap',
            'services': 'Services',
            'tools': 'Tools',
            'hidden-1': 'Hidden-1'
        };

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const type = urlParams.get('type') || 'project'; // Default to project

            const pageTitle = document.getElementById('page-title');
            const pageDesc = document.getElementById('page-desc');
            const container = document.getElementById('items-container');

            // Set Title and Description
            pageTitle.textContent = categoryTitles[type] || type;
            document.title = `${categoryTitles[type] || type} - Shaluka Gimhan`;
            pageDesc.textContent = categoryDescriptions[type] || 'Items in this category.';

            try {
                const res = await fetch(`/api/items/${type}`);
                const items = await res.json();

                if (items.length === 0) {
                    container.innerHTML = `<p style="color: #777;">No items found. Add some from the <a href="/admin.html">Admin Dashboard</a>.</p>`;
                    return;
                }

                container.innerHTML = '';
                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'item-card';

                    let tagsHtml = '';
                    if (item.tags && item.tags.length > 0) {
                        tagsHtml = `<div class="tags">${item.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>`;
                    }

                    let contentHtml = '';
                    if (type === 'project') {
                        const descriptionHtml = marked.parse(item.description || '');
                        contentHtml = `<div class="markdown-body" style="margin-top: 15px;">${descriptionHtml}</div>`;
                    } else {
                        let linkHtml = '';
                        if (item.link) {
                            const btnText = type === 'dataset' ? 'View Dataset' : 'View Research';
                            linkHtml = `<a href="${item.link}" target="_blank" class="link-btn"><i class="fas fa-external-link-alt"></i> ${btnText}</a>`;
                        }
                        contentHtml = `
                            <p style="margin-top: 10px;">${item.description || ''}</p>
                            ${linkHtml}
                        `;
                    }

                    card.innerHTML = `
                        <h3>${item.title}</h3>
                        ${tagsHtml}
                        ${contentHtml}
                        <div style="margin-top: 20px; font-size: 0.85rem; color: #888; border-top: 1px solid #eee; padding-top: 10px;">Added: ${new Date(item.createdAt).toLocaleDateString()}</div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Error fetching items:', error);
                container.innerHTML = '<p style="color: #ff4444;">Error loading data. Please check if MongoDB is connected.</p>';
            }
        });
    </script>
</body>
</html>
